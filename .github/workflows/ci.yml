name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test tooling
        run: python -m pip install --upgrade pip pytest build
      - name: Compile plugin modules
        run: python -m py_compile __init__.py store.py schema.py audit.py redaction.py recall_cli.py
      - name: Run standalone roadmap tests
        run: python -m pytest tests/test_recall_roadmap.py -q
      - name: Build package
        run: python -m build
      - name: Check installer syntax
        run: bash -n scripts/install.sh scripts/recall_dogfood.sh
